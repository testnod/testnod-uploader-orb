description: >
  Minimal executor for running the `upload` command/job. Only needs bash and
  curl, so it uses the small `cimg/base` image.
docker:
  - image: 'cimg/base:<<parameters.tag>>'
parameters:
  tag:
    default: current
    description: >
      Pick a specific cimg/base image tag:
      https://hub.docker.com/r/cimg/base/tags
    type: string
